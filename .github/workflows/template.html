<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuSHRED</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-subtle: #f6f8fa;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --link: #0969da;
            --accent: #0550ae;
            --code-bg: #f6f8fa;
            --sidebar-width: 220px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --bg-subtle: #161b22;
                --border: #30363d;
                --text: #e6edf3;
                --text-muted: #8b949e;
                --link: #58a6ff;
                --accent: #79c0ff;
                --code-bg: #161b22;
            }
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            line-height: 1.7;
            font-size: 16px;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            padding: 32px 16px;
            background-color: var(--bg-subtle);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #sidebar .toc-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        #sidebar a {
            display: block;
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            line-height: 1.4;
            transition: background 0.15s, color 0.15s;
        }

        #sidebar a:hover {
            background-color: var(--border);
            color: var(--text);
        }

        #sidebar a.toc-h1 { font-weight: 600; color: var(--text); }
        #sidebar a.toc-h3 { padding-left: 20px; }

        /* Main content */
        #content {
            margin-left: var(--sidebar-width);
            padding: 48px 64px;
            max-width: 860px;
            width: 100%;
        }

        h1, h2, h3, h4 {
            color: var(--text);
            font-weight: 600;
            line-height: 1.3;
            margin-top: 2em;
            margin-bottom: 0.5em;
        }

        h1 { font-size: 1.9rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
        h2 { font-size: 1.35rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h3 { font-size: 1.1rem; }

        p { margin: 0.8em 0; }

        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Code */
        pre {
            background-color: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.875em;
            background-color: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: inherit;
        }

        /* Blockquote */
        blockquote {
            background-color: var(--bg-subtle);
            border-left: 4px solid var(--link);
            border-radius: 0 6px 6px 0;
            margin: 1.2em 0;
            padding: 12px 16px;
            color: var(--text-muted);
        }

        blockquote p { margin: 0; color: var(--text); }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.2em 0;
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px 14px;
            border: 1px solid var(--border);
            text-align: center;
        }

        th {
            background-color: var(--bg-subtle);
            font-weight: 600;
            color: var(--text);
        }

        td:first-child { text-align: left; font-weight: 500; }

        tr:nth-child(even) td { background-color: var(--bg-subtle); }

        /* Images */
        img { max-width: 100%; border-radius: 6px; }

        /* Horizontal rule */
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2em 0;
        }

        /* Badges / inline images */
        p img { vertical-align: middle; margin: 0 2px; }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            #sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 16px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }

            #sidebar .toc-label { width: 100%; }

            #content {
                margin-left: 0;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="toc-label">Contents</div>
        <div id="toc"></div>
    </nav>

    <main id="content">
        <article>
            $body$
        </article>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const toc = document.getElementById("toc");
            const headers = document.querySelectorAll("h1, h2, h3");

            headers.forEach((header, index) => {
                if (!header.id) header.id = "section-" + index;
                const link = document.createElement("a");
                link.href = "#" + header.id;
                link.textContent = header.textContent.replace(/^[^\w]+/, "").trim();
                link.className = "toc-" + header.tagName.toLowerCase();
                toc.appendChild(link);
            });
        });
    </script>

</body>
</html>
